<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudando a cor do site</title>
       
</head>
<body>


    <!-- h1 é onde colocamos textos e emoji -->
    <h1>🎨 Mudando a cor de fundo</h1>
   
    <!-- A tag p é a tag para escrever textos corridos, explicações e conteúdo textual em geral na página! -->
    <p>Clique nos botões para mudar a cor do site:</p>
   


<!-- A div é como uma caixa vazia que usamos para organizar e agrupar outros elementos na página. Nesta nossa caixa vamos colocar os botões-->


    <div>
        <button>Azul</button>
        <button>Verde</button>
        <button>Vermelho</button>
        <button>Amarelo</button>
        <button>Roxo</button>
        <button>Voltar ao normal</button>
    </div>
   
</body>
</html>
